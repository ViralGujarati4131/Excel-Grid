<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas Excel-like Grid</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        height: 100%;
    }
    canvas {
        display: block;
        background: #fff;
    }
    #cellEditor {
        position: absolute;
        display: none;
        border: 1px solid #000;
        font-size: 14px;
        padding: 0;
        margin: 0;
        outline: none;
        box-sizing: border-box;
    }
</style>
</head>
<body>
    <canvas id="gridCanvas"></canvas>
    <input type="text" id="cellEditor">

  
    <script src="js/Main.js"></script>
    <script src="js/Grid.js"></script>
    <script src="js/Row.js"></script>
    <script src="js/Column.js"></script>
    <script src="js/Cell.js"></script>
</body>
</html>
