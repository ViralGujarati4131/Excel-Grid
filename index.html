<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLID Canvas Spreadsheet</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            background-color: #f3f3f3;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            background: #fff;
        }
        #cellEditor {
            position: absolute;
            display: none;
            border: 2px solid #0078d4; 
            font-size: 14px;
            padding: 0 4px;
            margin: 0;
            outline: none;
            box-sizing: border-box;
            background: white;
            font-family: Arial, sans-serif;
        }
        #statusBar {
            position: absolute;
            bottom: 0;
            right: 0;
            left: 0;
            height: 24px;
            background-color: #0078d4;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 12px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 16px;
            box-sizing: border-box;
            gap: 16px;
            user-select: none;
            z-index: 10; 
        }
        .stat-calc {
            display: none; 
        }
    </style>
</head>
<body>
    <canvas id="gridCanvas"></canvas>

    <input type="text" id="cellEditor">

    <div id="statusBar">
        <span id="statCount">Count: 0</span>
        <span id="statSum" class="stat-calc">Sum: 0</span>
        <span id="statAvg" class="stat-calc">Avg: 0</span>
        <span id="statMin" class="stat-calc">Min: 0</span>
        <span id="statMax" class="stat-calc">Max: 0</span>
    </div>

    <script type="module" src="/dist/main.js"></script>
</body>
</html>
